<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="28" fill="#1e3a5f"/>
  <!-- House roof -->
  <polygon points="96,28 152,80 40,80" fill="#3b82f6"/>
  <!-- House body -->
  <rect x="52" y="80" width="88" height="72" fill="#2563eb"/>
  <!-- Door -->
  <rect x="82" y="110" width="28" height="42" fill="#1e3a5f"/>
  <!-- Euro symbol -->
  <text x="96" y="148" font-size="34" font-weight="900" text-anchor="middle"
        fill="#fbbf24" font-family="Arial, sans-serif">€</text>
  <!-- Radar arcs -->
  <circle cx="148" cy="44" r="6" fill="#10b981"/>
  <path d="M148,44 m-18,0 a18,18 0 0,1 18,-18" stroke="#10b981" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M148,44 m-28,0 a28,28 0 0,1 28,-28" stroke="#10b981" stroke-width="2" fill="none" opacity="0.4"/>
